name: smoke

on:
  push:
    branches: [windows]

jobs:
  smoke:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: install laboot
        run: pwsh scripts/install.ps1
      - name: laboot commands (fast path, via installed laboot)
        shell: pwsh
        run: |
          & "$env:LOCALAPPDATA\laboot\laboot.ps1" setup-gh
          & "$env:LOCALAPPDATA\laboot\laboot.ps1" setup-nvm
      # setup-sdkman needs zip/unzip, which a bare Git for Windows install
      # doesn't ship (no package manager to add it either) — soft-check
      # only, so a missing zip on this runner doesn't fail the whole job.
      - name: laboot setup-sdkman (soft check — needs zip, not always present)
        shell: pwsh
        continue-on-error: true
        run: |
          & "$env:LOCALAPPDATA\laboot\laboot.ps1" setup-sdkman
