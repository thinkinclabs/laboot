name: smoke

on:
  push:
    branches: [mac]

jobs:
  smoke:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: install laboot
        run: bash scripts/install.sh
      - name: laboot commands (fast path, all idempotent no-ops on this runner)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          laboot setup-brew
          laboot setup-gh
          laboot setup-sdkman
          laboot setup-nvm
