name: smoke

on:
  push:
    branches: [windows]

jobs:
  setup_gh:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - run: pwsh scripts/setup_gh.ps1
      - name: install laboot
        run: pwsh scripts/install.ps1
      - name: laboot setup_gh (fast path, via installed laboot)
        shell: pwsh
        run: |
          . $PROFILE
          laboot setup_gh
