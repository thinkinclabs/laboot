name: smoke

on:
  push:
    branches: [windows]

jobs:
  smoke:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: install laboot
        run: pwsh scripts/install.ps1
      - name: laboot commands (fast path, via installed laboot)
        shell: pwsh
        run: |
          & "$env:LOCALAPPDATA\laboot\laboot.ps1" setup-gh
          & "$env:LOCALAPPDATA\laboot\laboot.ps1" setup-nvm
          & "$env:LOCALAPPDATA\laboot\laboot.ps1" setup-sdkman
